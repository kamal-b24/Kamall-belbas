<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BBS Professor</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="https://picsum.photos/seed/bbsprof/192/192" />
  </head>
  <body>
    <div id="root">
      <div style="display: flex; align-items: center; justify-content: center; height: 100vh; background: #000; color: #fff; font-family: sans-serif;">
        <div style="text-align: center;">
          <h1 style="font-size: 2rem; margin-bottom: 1rem;">BBS Professor</h1>
          <p style="color: #666;">Initializing application...</p>
          <p id="debug-status" style="font-size: 0.8rem; color: #444; margin-top: 2rem;">Waiting for scripts...</p>
        </div>
      </div>
    </div>
    <script>
      window.addEventListener('load', () => {
        const status = document.getElementById('debug-status');
        if (status) status.innerText = 'Scripts loaded, starting React...';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
